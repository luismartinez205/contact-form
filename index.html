<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
    <title>Contact Us</title>
</head>

<body>
    <div id="toast" class="toast">
  <div class="toast-content">
    <span class="icon"><img src="icon-success-check.svg" alt="" srcset=""></span>
    <div>
      <strong>Message Sent!</strong>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </div>
  </div>
</div>
    <form id="form" class="form-container" novalidate>
        <h2>Contact Us</h2>

        <div class="row">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" required>
                <small class="error-message">This field is required</small>
            </div>

            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" required>
                <small class="error-message">This field is required</small>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" required>
            <small class="error-message">Please enter a valid email address</small>
        </div>

        <div class="form-group">
            <label>Query Type *</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="query" id="general" required>
                    <span class="icon-radio"></span>
                    General Enquiry
                </label>
                <label>
                    <input type="radio" name="query" id="support" required>
                    <span class="icon-radio"></span>
                    Support Request
                </label>
            </div>
            <small class="error-message">Please select a query type</small>
        </div>

        <div class="form-group">
            <label>Message *</label>
            <textarea required></textarea>
            <small class="error-message">This field is required</small>
        </div>

        <div class="form-group checkbox">
            <label>
                <input type="checkbox" id="consent" required>
                <span class="icon-checkbox"></span>
                I consent to being contacted by the team *                
            </label>
            <small class="error-message">To submit this form, you must consent to being contacted by the team</small>
        </div>         
        <button type="submit">Submit</button>        
    </form>

</body>
<script src="main.js"></script>
</html>
